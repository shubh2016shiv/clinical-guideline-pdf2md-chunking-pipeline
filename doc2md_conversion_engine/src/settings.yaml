# =============================================================================
# Pipeline Settings
# Read by: contracts/pipeline_config.py → distributed to all stages
# =============================================================================


# -----------------------------------------------------------------------------
# Storage
# Filesystem root for all per-job workspaces.
# Read by: contracts/pipeline_config.py → file_upload_management
# Each conversion job gets:  doc_assets/<sha256_job_id>/output/
# -----------------------------------------------------------------------------
storage:
  doc_assets_dir: "doc_assets"      # relative to process cwd, or use an absolute path


# -----------------------------------------------------------------------------
# Document Constraints
# Enforced by Stage 1 (document_sha256_hasher)
# before any GPU, model loading, or external API is touched.
# Read by: contracts/pipeline_config.py → stage1_document_prescanning
# -----------------------------------------------------------------------------
document_constraints:
  max_file_size_bytes: 209715200    # 200 MB — reject oversized files at the hasher
  max_pages: 500                    # reject documents with more pages than this


# -----------------------------------------------------------------------------
# Document Feature Extraction
# Tunes deterministic evidence extraction used before capability-based routing.
# These values define what becomes evidence/candidates; they do not directly
# select an engine. Keep ranges conservative and tune from observed false
# positives/negatives in your guideline corpus.
# Read by: contracts/pipeline_config.py → stage1_document_prescanning/doc_feature_extraction
# -----------------------------------------------------------------------------
document_feature_extraction:
  pdf:
    # Fraction of page area that makes an image/table "large".
    # Range: 0.05-0.15. Lower catches smaller figures; higher avoids logos/icons.
    large_visual_area_ratio: 0.08

    # Fraction of page area for an embedded image to become a visual candidate.
    # Range: 0.01-0.05. Lower is sensitive; higher is quieter.
    image_candidate_min_area_ratio: 0.02

    # Drawing objects on one page before recording a vector-graphics candidate.
    # Range: 20-100. Higher reduces noise from borders, bullets, and decorations.
    vector_graphics_page_min_drawings: 20

    # Keep only the top-ranked candidates for routing/debugging.
    # Range: 1-50.
    max_visual_candidates: 10

  docx:
    # Conservative estimate of body-text characters per rendered page.
    # Used only to approximate page count. Err toward over-counting pages.
    # Range: 1500-3000. Lower → more pages estimated; higher → fewer.
    average_characters_per_page: 2000

    # Keep only this many visual candidates (one per feature type: images, tables).
    # Range: 1-50.
    max_visual_candidates: 10

  pptx:
    # Fraction of slide area that makes a picture shape "large" (primary content vs decoration).
    # Range: 0.05-0.15. Lower catches smaller figures; higher ignores logos/icons.
    large_visual_area_ratio: 0.08

    # Visual shapes (images + charts + drawings) on one slide before flagging it as
    # a SLIDE_VISUAL_CLUSTER candidate (likely an infographic or architecture diagram).
    # Range: 5-15. Lower is more sensitive; higher reduces false positives.
    diagram_heavy_slide_min_visual_shapes: 8

    # Keep only the top-ranked candidates for routing/debugging.
    # Range: 1-50.
    max_visual_candidates: 10

  html:
    # Conservative estimate of readable body-text characters per page equivalent.
    # HTML has no real pages — used only to normalise to a comparable unit.
    # Range: 1500-3000. Lower → more pages estimated; higher → fewer.
    average_characters_per_page: 2000

    # Keep only the top-ranked candidates for routing/debugging.
    # Candidates ranked by label presence (alt text / caption); no area available.
    # Range: 1-50.
    max_visual_candidates: 10

  engine_needs_evaluator:
    # Minimum fraction of page/slide area for a visual to be treated as meaningful content.
    # Visuals BELOW this threshold AND whose label contains a decorative term are excluded
    # from VLM routing — they are likely logos, icons, or dividers, not clinical figures.
    # A large image labelled "logo" is still inspected (size alone triggers routing).
    # Range: 0.03-0.10.
    meaningful_visual_area_ratio: 0.05

    # Words in alt text or nearby caption that flag a small visual as decorative.
    # Only applied to visuals smaller than meaningful_visual_area_ratio.
    # Add domain-specific terms (e.g. watermark, stamp) if your corpus needs them.
    decorative_image_terms:
      - logo
      - icon
      - header
      - footer
      - decorative


# -----------------------------------------------------------------------------
# Engine Routing
# Controls which conversion engine is selected.
# Routing is driven by deterministic feature extraction + local Ollama VLM —
# not by hand-tuned numeric complexity thresholds.
# Read by: contracts/pipeline_config.py → stage1_document_prescanning
# -----------------------------------------------------------------------------
engine_routing:
  conversion_engine: auto          # auto | mineru | docling
  # Local Ollama model used for visual routing decisions
  ollama_client:
    base_url: "http://127.0.0.1:11434"
    model: "qwen3.5:4b"
    timeout_seconds: 600.0          # 10 min — reasoning models on local hardware need time
    max_candidates: 5               # top-N visual candidates sent per document


# -----------------------------------------------------------------------------
# MinerU Engine
# Read by: contracts/mineru_engine_config.py → stage2 MinerU engine
# -----------------------------------------------------------------------------
mineru_engine:
  backend: auto                     # auto | vlm | pipeline
  api_host: "127.0.0.1"
  api_port: 8888
  startup_timeout_seconds: 60       # max wait for mineru-api subprocess to be ready
  window_timeout_seconds: 300       # max time per window before circuit breaker trip
  vlm_model: "opendatalab/MinerU-VLM"


# -----------------------------------------------------------------------------
# Docling Engine
# Read by: contracts/docling_engine_config.py → stage2 Docling engine
# -----------------------------------------------------------------------------
docling_engine:
  num_threads: 4                    # ThreadPool size for in-process page parallelism
  ocr_enabled: true
  ocr_backend: rapidocr             # rapidocr | easyocr
  table_structure_model: tableformer


# -----------------------------------------------------------------------------
# Windowed Extraction
# Controls memory-bounded streaming through the document.
# Read by: contracts/pipeline_config.py → stage2 windowed extraction
# -----------------------------------------------------------------------------
windowed_extraction:
  window_size: 8                    # pages per GPU window (tune for VRAM budget)
  max_concurrent_windows: 2         # parallel windows (GPU engines only)
  checkpoint_interval_pages: 4      # fsync checkpoint every N pages


# -----------------------------------------------------------------------------
# Checkpointing
# Read by: contracts/pipeline_config.py → checkpointing module
# -----------------------------------------------------------------------------
checkpointing:
  checkpoint_dir: ".checkpoints"
  enabled: true


# -----------------------------------------------------------------------------
# GPU Resource Management
# Read by: contracts/pipeline_config.py → gpu_resource_management
# -----------------------------------------------------------------------------
gpu:
  enabled: true
  force_cpu: false
  cuda_device_id: 0                 # ignored if force_cpu: true
  max_vram_mb: 5500                 # preflight ceiling for GPU engine startup


# -----------------------------------------------------------------------------
# Figure LLM Summarization (Vision LLM)
# Read by: contracts/vision_llm_client_config.py → stage3 figure summarization
# Provider-agnostic — swap model/base_url to change provider without code changes.
# -----------------------------------------------------------------------------
figure_summarization:
  enabled: true
  worker_pool_size: 3               # fixed number of concurrent vision LLM workers
  batch_size: 5                     # images per API call (QVQ-Max: keep lower due to reasoning depth)
  max_queue_size: 100               # bounded figure queue (backpressure on extraction)
  rate_limit_rpm: 60                # requests per minute ceiling (DashScope default)
  batch_timeout_seconds: 60         # QVQ chain-of-thought is slower — raise from 30s
  token_resolution_timeout_seconds: 300   # max wait per ${FIG:...} token in assembly
  figure_retries: 3                 # retries before poison-pill skip
  deduplication_enabled: true       # SHA256 cache — skip reused diagrams
  deduplication_cache_dir: ".figure_cache"

  vision_llm:
    provider: dashscope             # dashscope | openai | anthropic (determines base_url)
    model: "qvq-max"                # qvq-max | qwen3-vl-flash-2026-01-22
    # DashScope OpenAI-compatible endpoint (international)
    api_base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
    api_key_env_var: DASHSCOPE_API_KEY   # env var name — never put the key here
    # qvq-max uses streaming-only output; set to true
    streaming: true


# -----------------------------------------------------------------------------
# Fault Tolerance
# Read by: contracts/pipeline_config.py → fault_tolerance module
#
# Libraries:
#   circuit_breaker → aiobreaker (asyncio-native, pure Python — works on 3.12+)
#   retry           → stamina (async-first, Prometheus observability built-in)
#   timeout         → asyncio.timeout() stdlib (Python 3.12+, no extra dep)
# -----------------------------------------------------------------------------
fault_tolerance:

  # aiobreaker config
  # Docs: https://aiobreaker.readthedocs.io/en/latest/
  circuit_breaker:
    fail_max: 3                     # failures within the time window before circuit opens
    timeout_duration_seconds: 60    # OPEN -> HALF-OPEN probe delay (maps to timedelta)
    # Exceptions that do NOT count as failures (expected/non-fault errors)
    exclude_exceptions:
      - asyncio.CancelledError

  # stamina retry config for callers that opt into the retry policy
  # Docs: https://stamina.hynek.me/en/stable/api.html
  retry:
    attempts: 3                     # total attempts, including the first call
    timeout_seconds: 90.0           # total time budget across all attempts (stamina: timeout=)
    wait_initial_seconds: 1.0       # delay before first retry (stamina: wait_initial=)
    wait_max_seconds: 30.0          # backoff ceiling (stamina: wait_max=)
    wait_jitter_seconds: 2.0        # random jitter added per attempt (stamina: wait_jitter=)
    wait_exp_base: 2.0              # exponential growth factor (stamina: wait_exp_base=)

  # asyncio.timeout() config — per-operation hard deadlines
  # No library needed: asyncio.timeout() is stdlib from Python 3.11+
  timeouts:
    engine_window_seconds: 300      # max time for a single GPU extraction window
    llm_batch_call_seconds: 60      # max time for one vision LLM batch API call
    gpu_acquire_seconds: 30         # max wait to acquire exclusive GPU context
    figure_token_resolution_seconds: 300  # max wait for ${FIG:...} token in assembly


# -----------------------------------------------------------------------------
# Assembly and Output
# Read by: contracts/pipeline_config.py → stage4 assembly
# -----------------------------------------------------------------------------
assembly:
  output_flush_threshold_bytes: 1048576   # 1 MB — flush assembled markdown to disk
  degraded_mode_placeholder: "[Figure: processing failed — see original document]"


# -----------------------------------------------------------------------------
# Observability
# Read by: contracts/pipeline_config.py → observability module
# -----------------------------------------------------------------------------
observability:
  log_level: INFO                   # DEBUG | INFO | WARNING | ERROR
  structured_logging: true          # emit JSON logs per page event
  metrics_enabled: true
  health_check_enabled: true
